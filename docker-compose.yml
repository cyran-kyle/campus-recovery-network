version: '3.8'

services:
  db:
    image: cockroachdb/cockroach:v23.1.8
    container_name: campus-recovery-db
    command: start-single-node --insecure
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "cockroach", "node", "status", "--insecure"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus-recovery-backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://root@db:26257/defaultdb?sslmode=disable
      - PORT=3000
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campus-recovery-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  cockroach_data:
